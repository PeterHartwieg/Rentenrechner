name = "rentenwiki-qa-submit"
main = "src/index.ts"
compatibility_date = "2025-09-01"

# Custom domain — Cloudflare creates the qa.rentenwiki.de DNS record on deploy.
# rentenwiki.de must be an active zone on this Cloudflare account (verified via
# nslookup before scaffolding).
[[routes]]
pattern = "qa.rentenwiki.de"
custom_domain = true

# R2 bucket for screenshots. Create once via:
#   wrangler r2 bucket create rentenwiki-qa-screenshots
[[r2_buckets]]
binding = "QA_SCREENSHOTS"
bucket_name = "rentenwiki-qa-screenshots"

# Public, non-secret config. Site key is safe in source.
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAADKSdGCO2gQSFrtS"
GH_REPO = "PeterHartwieg/Rentenrechner"
ALLOWED_ORIGINS = "https://rentenwiki.de,https://www.rentenwiki.de"

# Secrets (set via `wrangler secret put <NAME>` after first deploy):
#   TURNSTILE_SECRET   — secret key from the Turnstile site
#   GH_PAT             — fine-grained PAT for PeterHartwieg/Rentenrechner
#   GH_WEBHOOK_SECRET  — shared secret configured on the GitHub `issues.closed`
#                        webhook (https://github.com/PeterHartwieg/Rentenrechner/settings/hooks)
