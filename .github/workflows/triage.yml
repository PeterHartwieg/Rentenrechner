name: triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build triage facts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/automation/triage-facts.mjs

      - name: Run triage agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash(gh:*),Read,Grep,Glob
          prompt: |
            You are the triage agent for issue #$ISSUE_NUMBER in
            PeterHartwieg/Rentenrechner.

            Read `docs/agents/issue-tracker.md`, `docs/agents/triage-labels.md`,
            and `.automation-triage-facts.json` first. The facts file already
            parsed source category, QA header fields, title severity/type, and
            auto-promote shape; use it as your compact input.

            **Inputs**
            - Issue number: $ISSUE_NUMBER
            - Title: $ISSUE_TITLE
            - Author: $ISSUE_AUTHOR
            - Fetch body/labels only when you need exact text:
              `gh issue view $ISSUE_NUMBER --json labels,body,comments,author`.

            **Flow**
            1. **Sufficiency.** If the issue body is empty or too vague to act on,
               apply `needs-info`, comment with the AI-generated triage marker, and stop.
            2. **Classify bug vs enhancement.** `bug` = broken/wrong behavior;
               `enhancement` = new capability. QA-shape wishes in German ("Wäre
               schön...", "Ich würde mir wünschen...") are enhancements even if
               filed through QA.
            3. **QA type.** For QA sources, trust the title type unless it is
               `other` or clearly wrong. If needed, re-derive one of
               `copy|layout|value|a11y|flow|interaction|other` from tester comment,
               target id, and screenshot filename. Rewrite only the `qa(type)` token
               with `gh issue edit --title`; preserve severity and target.
            4. **Dedup / already-fixed.**
               - `QA-maintainer`, pre-curated, and pre-reviewed: skip both.
               - `QA-anonymous` bugs: strong dedup only. Same `Target id` + same
                 `Route` among open issues => close as duplicate and label
                 `duplicate`. Otherwise map target prefixes to likely files
                 (`inputs.*`, `results.*`, `legal.*`) and check merged PRs from the
                 last 14 days; overlapping files => close with `fixed-in-PR`.
               - Non-QA plain: title-only near-duplicate check. Label
                 `possible-duplicate` and comment; never auto-close.
            5. **Body enrichment.** Only enrich plain non-QA bugs. Add reproduction,
               expected/actual, environment, and likely code paths. Preserve original
               text below your AI-generated triage marker. Do not enrich QA,
               pre-curated, pre-reviewed, or enhancement issues.
            6. **Area label.** Apply at most one: `area:copy`, `area:ui-only`, or
               `documentation`. QA type `copy` => `area:copy`; `layout` =>
               `area:ui-only`; `a11y`, `value`, `flow`, `interaction`, `other` =>
               no area label.
            7. **Guardrail check for enhancements.** Skip trusted sources
               (`QA-maintainer`, pre-curated). For anonymous QA wishes,
               pre-reviewed enhancements, and plain enhancements, scan for backend,
               telemetry, analytics, cookies, accounts, commercial/bulk/white-label,
               or permanent disclaimer removal. On match, apply
               `needs-product-review` and comment with the touched CLAUDE.md
               guardrail.
            8. **Gate state.** Auto-promote only when all hold:
               QA source; classified `bug`; no Step 4 early exit; severity
               `Major|Minor|Nit`; derived type `copy|layout|a11y|value`;
               `Target id` present; precision `exact|nested`; tester comment has
               >10 chars of substance.

               If auto-promote and area label is `area:copy` or `area:ui-only`
               with `Precision: exact`, use the single-stage shortcut:
               add `ready-for-PR,in-progress-by-agent,<area-label>` and remove
               `needs-triage`. Otherwise add `ready-for-agent,<area-label-if-any>`
               and remove `needs-triage`. Use one `gh issue edit` call.

               If not auto-promote eligible, leave `needs-triage`; do not add
               `ready-for-agent` or `ready-for-PR`.

            **Hard rules**
            - Use only `gh` for issue mutations.
            - Do not push code, open PRs, or edit repo files.
            - False positives are expensive: when unsure, leave `needs-triage`.
            - Every comment/body section you write starts with the AI-generated
              marker from `docs/agents/issue-tracker.md`.
