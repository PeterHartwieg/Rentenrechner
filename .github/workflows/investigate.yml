name: investigate

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: investigate-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  investigate:
    if: ${{ github.event.label.name == 'ready-for-agent' && !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci && npm --prefix workers/qa-submit ci

      - name: Mark in-progress-by-agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-label in-progress-by-agent \
            --remove-label needs-triage,ready-for-agent

      - name: Configure git
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Run investigator agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You are Stage 1 for issue #$ISSUE_NUMBER: investigate, prove the
            bug/enhancement with a failing test when useful, then hand off. Do
            not fix and do not open a PR.

            `CLAUDE.md` and `CONTEXT.md` are already loaded via the harness; do
            NOT Read them. Use their section names only when needed.

            **Inputs**
            - Title: $ISSUE_TITLE
            - Labels: $ISSUE_LABELS
            - Fetch the issue with `gh issue view $ISSUE_NUMBER --comments`.

            **Steps**
            1. Branch from main:
               `git checkout -B agent/issue-$ISSUE_NUMBER origin/main`.
            2. Reproduce/validate.
               - Bug: read the affected files, trace the path, and write a
                 1-2 sentence failure path: "When X, `<file:line>` does Y,
                 causing Z."
               - Enhancement: confirm the requested behavior is missing.
               - `code-review` issues: before reading each named file, run
                 `git log --oneline --all -- <file>`; recent commits may have
                 already fixed the reported gap.
               - If already correct, already present, or too vague: comment
                 with evidence, apply `needs-info`, remove
                 `in-progress-by-agent`, write the retro file, and stop. Do not
                 push a branch.
            3. Decide TDD.
               - Write a failing test for calculation, state/reactivity,
                 routing/URL, storage, pure helpers, DOM-testable a11y, and
                 QA tooling behavior.
               - Skip with `TDD-skip: <reason>` for pure CSS/layout,
                 pure copy, docs, or manual-visual-only changes.
               - If writing a test: place it by local convention, run
                 `npx vitest run <test-file>`, confirm it fails for the right
                 reason, and commit only the test:
                 `git add <test-file> && git commit -m "test: failing test for #$ISSUE_NUMBER"`.
               - If the test passes today, your reproduction is wrong; exit via
                 the already-correct path.
            4. Push `agent/issue-$ISSUE_NUMBER`.
            5. Post one self-contained handoff comment starting with the exact
               marker `<!-- agent-handoff:investigate -->`:

               ```markdown
               <!-- agent-handoff:investigate -->
               > *This was generated by AI during investigation (Stage 1 of the agentic pipeline).*

               ## Reproduction
               <failure path or missing-behavior statement>

               ## Files to edit
               - `<path:line>` — <reason>

               ## Test status
               - Failing test added: `<path>`
               - OR TDD-skip: <reason>

               ## Branch
               `agent/issue-$ISSUE_NUMBER` is ready for Stage 2 (`implement.yml`).
               ```

            6. Apply `ready-for-PR`; keep `in-progress-by-agent`.
            7. Write `.automation-retro-entry.md` using
               `docs/automation/retro-template.md`. Do not read/edit the
               archive; the workflow appends it after you exit.

            **Hard rules**
            - No fix commits in Stage 1.
            - No main pushes; the workflow owns the retro push.
            - `.automation-retro-entry.md` is mandatory on every exit path.
            - Cleanup for vague/cannot-reproduce is `needs-info`, not
              `ready-for-human`.
            - Follow CLAUDE.md critical guardrails.

      - name: Append retro entry
        if: always()
        env:
          RETRO_STAGE: investigate
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RETRO_ENTRY_PATH: .automation-retro-entry.md
        run: node scripts/automation/append-retro.mjs
