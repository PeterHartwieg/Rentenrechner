name: review-loop-sweep

# Codex GitHub integration intentionally only flags P0/P1 issues — for routine
# PRs (docs, copy, small refactors) it stays silent. The event-driven
# review-loop.yml waits for both reviewers, so silence would block forever.
# This sweep runs every 10 min (GitHub Actions cron drops ticks under load —
# tightened from */30 after observing 6 consecutive missed ticks), finds any
# open agent PR where Claude has approved and Codex has been silent for at
# least 20 min, and merges it. review-loop.yml's wait branch also dispatches
# this workflow to make sweep event-driven on top of the cron — defense in
# depth. Fast, pure-shell, no Claude agent invocation (cost-zero on idle).

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: review-loop-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Sweep open agent PRs for Codex-silence merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MIN_AGE_MINUTES: '20'
        shell: bash
        run: |
          set -euo pipefail

          now_ts=$(date -u +%s)
          merged_any=0

          # Enumerate open automation-owned PRs. Retro-curation PRs carry the
          # same self-learning contract as issue-fix PRs, but use a different
          # branch prefix because they are not linked to a single issue.
          pr_numbers=$(gh pr list --repo "$REPO" --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("agent/issue-") or startswith("automation/retro-curate-")) | .number')

          if [ -z "$pr_numbers" ]; then
            echo "No open automation-owned PRs. Sweep idle."
            exit 0
          fi

          for pr in $pr_numbers; do
            echo "::group::PR #$pr"

            if ! pr_json=$(gh pr view "$pr" --repo "$REPO" \
              --json createdAt,headRefOid,body,headRefName,title); then
              echo "Skip: failed to load PR metadata; will retry on next tick."
              echo "::endgroup::"
              continue
            fi
            created=$(echo "$pr_json" | jq -r .createdAt)
            head_sha=$(echo "$pr_json" | jq -r .headRefOid)
            pr_body=$(echo "$pr_json" | jq -r .body)
            head_ref=$(echo "$pr_json" | jq -r .headRefName)
            pr_title=$(echo "$pr_json" | jq -r .title)

            created_ts=$(date -u -d "$created" +%s)
            age_min=$(( (now_ts - created_ts) / 60 ))

            if [ "$age_min" -lt "$MIN_AGE_MINUTES" ]; then
              echo "Skip: too young ($age_min min < $MIN_AGE_MINUTES min)"
              echo "::endgroup::"
              continue
            fi

            if ! reviews=$(gh api "repos/$REPO/pulls/$pr/reviews"); then
              echo "Skip: failed to fetch reviews; will retry on next tick."
              echo "::endgroup::"
              continue
            fi

            # Latest Claude review on the current head SHA — approved if body
            # carries the [Claude Review] marker AND mentions an Approve verdict.
            # Accepts the canonical `Verdict: Approve` line OR a Markdown-bold
            # heading-style approval at the start of any line (e.g. `**Approve.**`,
            # `**Verdict: Approve**`). Broadened after PR #191 stuck on
            # `**Approve.**` despite the strict prompt rule — reviewer drift is a
            # recurring failure mode worth tolerating in the parser. Block-style
            # rejection variants (`**Request changes**`) are still ignored here
            # because they don't match either alternative.
            claude_ok=$(echo "$reviews" | jq -r --arg sha "$head_sha" '
              [ .[]
                | select(.user.login == "claude[bot]")
                | select(.commit_id == $sha)
                | select(.body | startswith("[Claude Review]"))
              ]
              | last
              | if . == null then "false"
                elif (.body | test("Verdict.*Approve"; "i")) then "true"
                elif (.body | test("(?m)^[*]+\\s*Approve\\b"; "i")) then "true"
                else "false"
                end
            ')

            if [ "$claude_ok" != "true" ]; then
              echo "Skip: no Claude approval on head $head_sha yet"
              echo "::endgroup::"
              continue
            fi

            # Any Codex review on the current head SHA?
            codex_seen=$(echo "$reviews" | jq -r --arg sha "$head_sha" '
              [ .[]
                | select(.commit_id == $sha)
                | select(.user.login | test("codex|chatgpt"; "i"))
              ]
              | length > 0
            ')

            if [ "$codex_seen" = "true" ]; then
              echo "Skip: Codex has reviewed head $head_sha — event-driven loop owns this case"
              echo "::endgroup::"
              continue
            fi

            echo "Candidate for merge: Claude approved, Codex silent for $age_min min (>= $MIN_AGE_MINUTES)"

            # Pre-merge gate. Branch protection on main does NOT enforce required
            # checks (so retro-pushes from agent runs aren't blocked), so the
            # workflow itself is responsible for these gates:
            #   1. Branch up-to-date with main (preempts logical merge conflicts
            #      like #198 vs #199 where two PRs each green individually
            #      produce a broken main when squashed in sequence).
            #   2. Full `npm run verify` on the current head SHA (covers bot-pushed
            #      fix commits that do not trigger pull_request CI).
            #   3. Cloudflare Workers build green on HEAD (the production deploy
            #      gate; failed CF build = broken prod).

            # 1. Up-to-date check.
            if ! mergeable_state=$(gh pr view "$pr" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus); then
              echo "Skip: failed to load mergeable state; will retry on next tick."
              echo "::endgroup::"
              continue
            fi
            if [ "$mergeable_state" = "BEHIND" ]; then
              echo "Branch is BEHIND main — calling update-branch and deferring merge to next tick."
              gh pr update-branch "$pr" --repo "$REPO" || \
                echo "update-branch failed; will retry on next tick."
              echo "::endgroup::"
              continue
            fi
            if [ "$mergeable_state" = "DIRTY" ]; then
              echo "Branch is DIRTY — dispatching merge-conflict repair workflow and deferring merge."
              gh workflow run resolve-merge-conflict.yml \
                --repo "$REPO" \
                -f pr_number="$pr" \
                -f pr_title="$pr_title" \
                -f head_sha="$head_sha" \
                -f head_ref="$head_ref"
              if ! gh pr view "$pr" --repo "$REPO" --json comments \
                --jq '.comments[].body' | grep -q '^\[conflict-fix\]'; then
                gh pr comment "$pr" --repo "$REPO" --body \
                  "[conflict-fix] Branch is not cleanly mergeable with main. Dispatched resolve-merge-conflict.yml for \`$head_sha\`."
              fi
              echo "::endgroup::"
              continue
            fi

            verify_dir=$(mktemp -d)

            echo "Running npm run verify on $head_sha before merge."
            if ! (
              git init "$verify_dir"
              git -C "$verify_dir" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
              git -C "$verify_dir" fetch --depth=1 origin "$head_sha"
              git -C "$verify_dir" checkout --detach FETCH_HEAD
              cd "$verify_dir"
              npm ci
              for worker in workers/qa-submit workers/simulate; do
                if [ -f "$worker/package-lock.json" ]; then
                  npm --prefix "$worker" ci
                fi
              done
              npm run verify
            ); then
              echo "Skip: npm run verify failed on $head_sha; merge deferred."
              rm -rf "$verify_dir"
              echo "::endgroup::"
              continue
            fi

            rm -rf "$verify_dir"

            # 3. CF Workers Builds check on HEAD.
            cf_bucket=$(gh pr checks "$pr" --repo "$REPO" --json name,bucket \
              --jq '[.[] | select(.name == "Workers Builds: rentenwiki")] | last | .bucket // "missing"' || true)
            if [ -z "$cf_bucket" ]; then
              echo "Skip: failed to load Workers Builds: rentenwiki status; will retry on next tick."
              echo "::endgroup::"
              continue
            fi
            if [ "$cf_bucket" != "pass" ]; then
              echo "Skip: Workers Builds: rentenwiki is '$cf_bucket' (need 'pass'). Will retry on next tick."
              echo "::endgroup::"
              continue
            fi

            echo "All gates green — merging."
            # Merge — squash + delete branch (matches event-driven loop step 4a)
            if ! gh pr merge "$pr" --repo "$REPO" --squash --delete-branch; then
              echo "Skip: merge failed; will retry on next tick."
              echo "::endgroup::"
              continue
            fi

            # Close the linked issue and clear in-progress-by-agent. The PR body
            # uses GitHub's "Closes #N" convention, but we still close
            # explicitly because sweep merges can otherwise leave the issue open
            # while only removing the in-progress label.
            # Look for "Closes #N" or "Fixes #N" in the PR body.
            issue_num=$(echo "$pr_body" \
              | grep -ioE '(closes|fixes|resolves)[[:space:]]+#[0-9]+' \
              | head -1 \
              | grep -oE '[0-9]+' || true)
            if [ -n "$issue_num" ]; then
              issue_state=$(gh issue view "$issue_num" --repo "$REPO" --json state --jq .state || echo "")
              if [ "$issue_state" = "OPEN" ]; then
                echo "Closing linked issue #$issue_num"
                gh issue close "$issue_num" --repo "$REPO" --reason completed \
                  --comment "Closed by merged agent PR #$pr." || \
                  echo "Issue close failed after merge; leaving for cleanup."
              fi
              echo "Clearing in-progress-by-agent on issue #$issue_num"
              gh issue edit "$issue_num" --repo "$REPO" \
                --remove-label in-progress-by-agent || true
            fi

            # Post a confirmation comment matching the event-driven loop's [merge] marker
            gh pr comment "$pr" --repo "$REPO" --body \
              "[merge] Sweep merged: Claude approved on \`$head_sha\`, Codex silent for $age_min min (>= $MIN_AGE_MINUTES min Codex-silence threshold). PRs of low P0/P1 risk often draw no Codex review — see review-loop-sweep.yml."

            merged_any=1
            echo "::endgroup::"
          done

          if [ "$merged_any" = "0" ]; then
            echo "Sweep complete: no PRs eligible for Codex-silence merge."
          fi
