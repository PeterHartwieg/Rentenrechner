name: review-loop

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write   # for `gh workflow run review-loop-sweep.yml` in the wait path

concurrency:
  group: review-loop-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  loop:
    if: ${{ startsWith(github.event.pull_request.head.ref, 'agent/issue-') || startsWith(github.event.pull_request.head.ref, 'automation/retro-curate-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Route review state
        id: route
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_REVIEW_LOOP_COMMITS: '10'
        run: node scripts/automation/review-loop-decision.mjs

      - name: Setup Node
        if: steps.route.outputs.decision == 'fix' || steps.route.outputs.decision == 'merge'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        if: steps.route.outputs.decision == 'fix' || steps.route.outputs.decision == 'merge'
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          for worker in workers/qa-submit workers/simulate; do
            if [ -f "$worker/package-lock.json" ]; then
              npm --prefix "$worker" ci
            fi
          done

      - name: Configure git
        if: steps.route.outputs.decision == 'fix'
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Merge approved PR
        if: steps.route.outputs.decision == 'merge'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ISSUE_NUMBER: ${{ steps.route.outputs.issue_number }}
        shell: bash
        run: |
          set -euo pipefail

          npm run verify

          mergeable_state=$(gh pr view "$PR_NUMBER" --json mergeStateStatus --jq .mergeStateStatus)
          if [ "$mergeable_state" = "BEHIND" ]; then
            echo "Branch is BEHIND main — updating branch and deferring merge."
            gh pr update-branch "$PR_NUMBER"
            exit 0
          fi
          if [ "$mergeable_state" = "DIRTY" ]; then
            echo "Branch is DIRTY — dispatching merge-conflict repair workflow and deferring merge."
            gh workflow run resolve-merge-conflict.yml \
              -f pr_number="$PR_NUMBER" \
              -f pr_title="$PR_TITLE" \
              -f head_sha="$PR_HEAD_SHA" \
              -f head_ref="$PR_BRANCH"
            gh pr comment "$PR_NUMBER" --body \
              "[conflict-fix] Branch is not cleanly mergeable with main. Dispatched resolve-merge-conflict.yml for \`$PR_HEAD_SHA\`."
            exit 0
          fi

          cf_bucket=$(gh pr checks "$PR_NUMBER" --json name,bucket \
            --jq '[.[] | select(.name == "Workers Builds: rentenwiki")] | last | .bucket // "missing"')
          if [ "$cf_bucket" != "pass" ]; then
            echo "Workers Builds: rentenwiki is '$cf_bucket' (need 'pass')."
            if [ "$cf_bucket" = "fail" ]; then
              gh pr comment "$PR_NUMBER" --body "[merge] Workers Builds: rentenwiki failed on \`$PR_HEAD_SHA\`; merge deferred."
            fi
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch

          if [ -n "$ISSUE_NUMBER" ]; then
            issue_state=$(gh issue view "$ISSUE_NUMBER" --json state --jq .state || echo "")
            if [ "$issue_state" = "OPEN" ]; then
              gh issue close "$ISSUE_NUMBER" --reason completed \
                --comment "Closed by merged agent PR #$PR_NUMBER."
            fi
            gh issue edit "$ISSUE_NUMBER" --remove-label in-progress-by-agent || true
          fi

          gh pr comment "$PR_NUMBER" --body \
            "[merge] Merged after Claude and Codex were satisfied on \`$PR_HEAD_SHA\`."

      - name: Escalate runaway loop
        if: steps.route.outputs.decision == 'cap'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ steps.route.outputs.issue_number }}
          COMMIT_COUNT: ${{ steps.route.outputs.commit_count }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --body \
            "[loop-cap] Branch has $COMMIT_COUNT commits beyond main; escalating to ready-for-human to prevent scope creep. Maintainer should review the diff and either merge as-is, reset the branch, or close and re-fire the issue."
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" \
              --add-label ready-for-human \
              --remove-label in-progress-by-agent || true
          fi

      - name: Wait for reviewer signal
        if: steps.route.outputs.decision == 'wait'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ROUTE_REASON: ${{ steps.route.outputs.reason }}
        shell: bash
        run: |
          echo "Waiting on PR #$PR_NUMBER at $PR_HEAD_SHA: $ROUTE_REASON"
          gh workflow run review-loop-sweep.yml

      - name: Run review-fix agent
        if: steps.route.outputs.decision == 'fix'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_AUTHOR: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_ID: ${{ github.event.review.id }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You are the review-fix agent for PR #$PR_NUMBER on branch $PR_BRANCH
            (head $PR_HEAD_SHA). The deterministic router already found blocking
            review feedback on the head commit.

            `CLAUDE.md` and `CONTEXT.md` are already loaded into your context via the
            harness's `claudeMd` system reminder — do NOT issue Read calls on those
            files.

            **Task**
            1. Read current-head reviews and inline review comments:
               `gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews`.
               `gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments`.
               Only use records where `commit_id == "$PR_HEAD_SHA"`.
            2. Collect concrete blockers from:
               - Claude reviews with `[Claude Review]` and `Verdict: Request changes`
                 (or a line-leading `Request changes` heading).
               - Codex/OpenAI reviews with `CHANGES_REQUESTED`, or `COMMENTED` bodies
                 that explicitly flag P0/P1 blockers.
               - Codex/OpenAI inline review comments that explicitly flag P0/P1
                 blockers.
               - Human `CHANGES_REQUESTED` reviews.
               Ignore "could also", "consider", and optional suggestions.
            3. Fix exactly those blockers. Keep the diff focused on the original PR.
               Add or update tests only when the blocker changes behavior.
            4. Run `npm run verify` until it passes.
            5. Commit with a clear message ending with
               `Addresses review on PR #$PR_NUMBER`, then push to `$PR_BRANCH`.

            **Hard rules**
            - Never use `gh pr review` from this workflow.
            - Never push to `main`, force-push, amend, or broaden scope.
            - Do NOT post `@codex review`; bot mentions cannot trigger Codex re-review.
            - If a blocker is unaddressable, comment on the PR. If there is a linked
              issue, label it `ready-for-human` and remove `in-progress-by-agent`;
              retro-curation PRs usually have no linked issue.

      - name: Dispatch post-fix checks
        if: steps.route.outputs.decision == 'fix'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          new_head_sha=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          echo "Dispatching post-fix verify and Claude review for PR #$PR_NUMBER at $new_head_sha"
          gh workflow run pr-verify.yml \
            -f pr_number="$PR_NUMBER" \
            -f head_sha="$new_head_sha" \
            -f head_ref="$PR_BRANCH"
          gh workflow run claude-review.yml \
            -f pr_number="$PR_NUMBER" \
            -f pr_title="$PR_TITLE" \
            -f head_sha="$new_head_sha" \
            -f head_ref="$PR_BRANCH"
