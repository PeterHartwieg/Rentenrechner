name: resolve-merge-conflict

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to repair"
        required: true
      pr_title:
        description: "Pull request title"
        required: true
      head_sha:
        description: "Exact pull request head SHA that was dirty"
        required: true
      head_ref:
        description: "Pull request head branch"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

concurrency:
  group: resolve-merge-conflict-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  resolve:
    if: ${{ startsWith(inputs.head_ref, 'agent/issue-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_ref }}

      - name: Configure git
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Prepare merge conflict
        id: prepare
        env:
          PR_HEAD_SHA: ${{ inputs.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          current_head=$(git rev-parse HEAD)
          if [ "$current_head" != "$PR_HEAD_SHA" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "PR head moved from $PR_HEAD_SHA to $current_head; skipping stale conflict repair."
            exit 0
          fi

          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          merge_exit=$?
          set -e

          if [ "$merge_exit" -eq 0 ]; then
            if git diff --quiet --cached && git diff --quiet; then
              echo "clean_merge=false" >> "$GITHUB_OUTPUT"
              echo "conflicted=false" >> "$GITHUB_OUTPUT"
              echo "Branch is already up to date with main."
              exit 0
            fi
            git commit -m "Merge main into PR #${{ inputs.pr_number }}"
            git push origin HEAD:${{ inputs.head_ref }}
            echo "clean_merge=true" >> "$GITHUB_OUTPUT"
            echo "conflicted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          conflicted_files=$(git diff --name-only --diff-filter=U)
          if [ -z "$conflicted_files" ]; then
            echo "Merge failed without unmerged files."
            exit "$merge_exit"
          fi

          echo "clean_merge=false" >> "$GITHUB_OUTPUT"
          echo "conflicted=true" >> "$GITHUB_OUTPUT"
          {
            echo "conflicted_files<<EOF"
            echo "$conflicted_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.prepare.outputs.conflicted == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        if: steps.prepare.outputs.conflicted == 'true'
        run: npm ci && npm --prefix workers/qa-submit ci

      - name: Run conflict-fix agent
        if: steps.prepare.outputs.conflicted == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_BRANCH: ${{ inputs.head_ref }}
          PR_HEAD_SHA: ${{ inputs.head_sha }}
          CONFLICTED_FILES: ${{ steps.prepare.outputs.conflicted_files }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You are the merge-conflict repair agent for PR #$PR_NUMBER:
            "$PR_TITLE".

            `origin/main` has already been merged into `$PR_BRANCH` with
            conflicts left in the working tree. The conflicted files are:

            $CONFLICTED_FILES

            `CLAUDE.md` and `CONTEXT.md` are already loaded into your context via
            the harness's `claudeMd` system reminder; do NOT issue Read calls on
            those files.

            **Task**
            1. Inspect the conflict markers and the surrounding code.
            2. Preserve the intent of the PR and the current `main` behavior.
            3. Keep the diff strictly to conflict resolution and any minimal test
               updates required by the merged main behavior.
            4. Run `npm run verify` until it passes.
            5. Commit with a clear message ending with
               `Resolves merge conflict on PR #$PR_NUMBER`, then push to
               `$PR_BRANCH`.

            **Hard rules**
            - Never use `gh pr review` from this workflow.
            - Never push to `main`, force-push, amend, or broaden scope.
            - Do NOT post `@codex review`; bot mentions cannot trigger Codex
              re-review.
            - If the conflict is unresolvable without changing product scope,
              abort the merge (`git merge --abort`), comment on the PR, label the
              linked issue `ready-for-human`, remove `in-progress-by-agent`, and
              stop.

      - name: Dispatch post-conflict checks
        if: steps.prepare.outputs.clean_merge == 'true' || steps.prepare.outputs.conflicted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_BRANCH: ${{ inputs.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          new_head_sha=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          echo "Dispatching post-conflict verify and Claude review for PR #$PR_NUMBER at $new_head_sha"
          gh workflow run pr-verify.yml \
            -f pr_number="$PR_NUMBER" \
            -f head_sha="$new_head_sha" \
            -f head_ref="$PR_BRANCH"
          gh workflow run claude-review.yml \
            -f pr_number="$PR_NUMBER" \
            -f pr_title="$PR_TITLE" \
            -f head_sha="$new_head_sha" \
            -f head_ref="$PR_BRANCH"
