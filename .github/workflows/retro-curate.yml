name: retro-curate

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: retro-curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Run curation agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You curate recent automation retros into operational memory for
            PeterHartwieg/Rentenrechner.

            `CLAUDE.md` is already loaded; do NOT Read it. Read
            `docs/automation/retro-template.md` for entry shape and
            `docs/automation/issue-to-merge-pipeline.md` only if you need the
            pipeline map.

            **Steps**
            1. Skip if a curation PR is already open:
               `gh pr list --search "head:automation/retro-curate-" --state open --json number,headRefName`.
            2. Read only recent archive diffs, not the whole archive:
               ```bash
               COMMITS=$(git log --since='7 days ago' --pretty=format:%H -- docs/automation/retro-archive.md)
               for c in $COMMITS; do
                 echo "=== commit $c ==="
                 git show --no-color --format= "$c" -- docs/automation/retro-archive.md
               done
               ```
            3. Promote only recurring patterns (2+ entries) or single high-signal
               invariants/false-failure patterns. Ignore routine/no-novel entries,
               one-off bugs, already-documented facts, and anything contradicting
               a guardrail.
            4. Target the smallest useful surface:
               - `CLAUDE.md`: project-wide invariant or module ownership fact.
               - `investigate.yml`: reproduction/test-writing shortcut.
               - `implement.yml`: fix/verify/Stage-1-escape shortcut.
               If borderline, prefer workflow prompt over CLAUDE.md.
            5. If nothing is promotable, print a short summary and exit.
            6. Otherwise create `automation/retro-curate-YYYY-MM-DD`, make surgical
               append-style edits, commit `docs(retro): curated promotions YYYY-MM-DD`,
               push, and open `Retro curation YYYY-MM-DD`.

            **PR body**
            Include:
            - Sources: date + issue + stage + one-line gist.
            - Proposed promotions grouped by target file.
            - Why these and not others.
            Do not include `Closes #N`.

            **Hard rules**
            - Never edit `docs/automation/retro-archive.md`; it is append-only.
            - Never reword existing CLAUDE.md text without explicit retro evidence.
            - Never widen workflow hard rules without retro evidence.
            - If unsure, leave it for a future curation run.
