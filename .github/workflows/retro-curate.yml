name: retro-curate

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: retro-curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Run curation agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You are the retro curation agent for PeterHartwieg/Rentenrechner.
            You read the retro archive, identify recurring patterns or single
            high-signal items, and propose promotions to the operational memory
            (CLAUDE.md or the workflow YAML prompts) via a PR.

            `CLAUDE.md` is already loaded into your context via the harness's
            `claudeMd` system reminder — do NOT issue a Read call on it. When
            checking whether a candidate promotion is already documented, grep
            CLAUDE.md for keywords from the candidate, don't re-read the whole
            file. Read `docs/automation/retro-template.md` for the archive
            entry format and `docs/automation/issue-to-merge-pipeline.md` for
            pipeline architecture.

            **Step 1: Skip if a curate PR is already open.**

            ```
            gh pr list --search "head:automation/retro-curate-" --state open --json number,headRefName
            ```

            If any curate PR is open, exit cleanly — the maintainer hasn't
            merged the previous batch yet, and double-curating risks duplicate
            promotions. Post no comment, just exit.

            **Step 2: Identify candidate entries.**

            Do NOT read the full `docs/automation/retro-archive.md` (it grows
            monotonically and is mostly irrelevant by date). Instead, list
            commits to the archive in the last 7 days and read just their
            diffs:

            ```bash
            COMMITS=$(git log --since='7 days ago' --pretty=format:%H -- docs/automation/retro-archive.md)
            for c in $COMMITS; do
              echo "=== commit $c ==="
              git show --no-color --format= "$c" -- docs/automation/retro-archive.md
            done
            ```

            Each `git show` diff contains exactly the entry that was appended
            in that commit (the file is append-only). Parse the frontmatter
            (`date:`, `issue:`, `pr:`, `stage:`, `outcome:`, `labels:`) and
            the body sections from each diff. This avoids re-reading the
            growing archive on every run.

            Group entries by:
            - `stage: investigate` — investigator-specific signal
            - `stage: implement` — implementer-specific signal
            - Cross-cutting (same learning appears in both stages, or applies
              to project-wide knowledge)

            **Step 3: Find promotable patterns.** A learning is promotable when:

            - **Recurring**: same or near-same learning appears in 2+ entries.
              The pattern has shown up enough to deserve operational memory.
            - **Single-instance high-signal**: a single entry contains a
              codebase invariant, file-ownership map, or false-failure pattern
              that future agents will likely hit. One-shot is enough if the
              signal is strong.
            - **NOT promotable**: routine fixes, "no novel learnings" runs,
              one-off bugs that won't recur, anything already documented in
              CLAUDE.md, anything contradicting an existing CLAUDE.md guardrail.

            For each promotable item, decide its target:

            - **CLAUDE.md** — project-wide knowledge any agent (or human)
              touching this codebase needs. Codebase invariants, module-
              ownership rules, cross-cutting gotchas. Add to the appropriate
              existing section (don't create new top-level sections without
              good reason); a one-bullet addition under "Non-obvious
              architecture" or a per-module section is the typical shape.
            - **`investigate.yml` prompt** — investigator-specific learnings
              that don't generalize beyond Stage 1. Reproduction shortcuts,
              false-failure patterns, "when you see X, suspect Y" heuristics.
              Add as a bullet in the relevant Step's "Strong signals" or
              "Three outcomes" subsection.
            - **`implement.yml` prompt** — implementer-specific learnings.
              Fix patterns, verify gotchas, Stage-1-escape signals. Add as a
              bullet in the relevant Step.

            If a learning is borderline between CLAUDE.md and a workflow
            prompt: prefer the workflow prompt. CLAUDE.md should stay tight;
            workflow prompts can absorb operational detail.

            **Step 4: If no promotable items, exit cleanly.**

            Many curation runs will find nothing to promote — that's normal.
            Don't open an empty PR. Print a brief summary to the run log
            (`echo "No promotable patterns this cycle. N entries reviewed."`)
            and exit with status 0.

            **Step 5: Branch, edit, push, open PR.**

            ```bash
            BRANCH="automation/retro-curate-$(date -u +%Y-%m-%d)"
            git checkout -b "$BRANCH"
            ```

            Apply your proposed edits. Each edit must be:
            - **Surgical** — one bullet or one paragraph at a time, in the
              right semantic location of the target file.
            - **Sourced** — for each edit, note (in the PR body) which retro
              archive entries motivated it, by date + issue number.
            - **Append-style** when adding to lists; **expand-style** when
              extending an existing bullet. Never reword existing canonical
              text unless the retro identifies a genuine inaccuracy.

            Commit with message `docs(retro): curated promotions YYYY-MM-DD`.
            Push, open PR with title `Retro curation YYYY-MM-DD` and a body
            structured like:

            ```
            > *This was generated by AI during retro curation (daily cron).*

            ## Sources
            - <date> issue #<N> (<stage>): <one-line gist>
            - <date> issue #<N> (<stage>): <one-line gist>

            ## Proposed promotions
            ### CLAUDE.md
            - <bullet describing the addition + rationale>
            ### investigate.yml prompt
            - <bullet>
            ### implement.yml prompt
            - <bullet>

            ## Why these and not others
            <One paragraph: what was reviewed, what was deferred and why.>
            ```

            Do NOT add `Closes #N` (this PR doesn't close any issue). Do NOT
            apply `ready-for-agent` (this PR is for human review).

            **Hard rules**
            - The curate PR is the ONLY thing this workflow produces. Never
              modify the retro archive itself (it's append-only and owned by
              the agent sessions).
            - Never delete or reword existing CLAUDE.md content unless you
              have explicit retro evidence it's wrong.
            - Never widen a workflow prompt's hard rules without a retro entry
              motivating the change. Hard rules are gates against bad behavior;
              loosening them needs deliberate review, not curation drift.
            - Branch naming `automation/retro-curate-YYYY-MM-DD` is required
              for the curate-PR-open check in Step 1 to work.
            - If you are uncertain whether to promote an item, leave it. The
              cron runs daily; a learning that's still salient next week will
              survive in the archive and get re-evaluated.
