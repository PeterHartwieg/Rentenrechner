name: implement

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: ${{ github.event.label.name == 'ready-for-PR' && !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout or create agent branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            git checkout -B "$BRANCH" origin/main
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          for worker in workers/qa-submit workers/simulate; do
            if [ -f "$worker/package-lock.json" ]; then
              npm --prefix "$worker" ci
            fi
          done

      - name: Remove ready-for-PR label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.number }} --remove-label ready-for-PR

      - name: Configure git
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Run implementer agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You are Stage 2 for issue #$ISSUE_NUMBER: implement the fix, verify,
            push, and open the PR.

            `CLAUDE.md` and `CONTEXT.md` are already loaded via the harness; do
            NOT Read them.

            **Inputs**
            - Title: $ISSUE_TITLE
            - Labels: $ISSUE_LABELS
            - You are on `agent/issue-$ISSUE_NUMBER`.
            - Run `git log --oneline origin/main..HEAD`.
            - Fetch Stage 1 handoff only:
              `gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" --jq '[.[] | select(.body | startswith("<!-- agent-handoff:investigate -->"))] | last | .body'`.
              Do not load the whole comment thread.

            **Normal path**
            1. Read the handoff (`## Reproduction`, `## Files to edit`,
               `## Test status`). If a test exists, run it once and confirm it
               still fails. If it already passes, escalate: comment, add
               `ready-for-human`, remove `in-progress-by-agent`, write retro,
               stop.
            2. Implement the minimal fix. If Stage 1 added a failing test, make
               it pass without weakening or deleting that test.
            3. Run `npm run verify`; iterate until it passes. Use it instead of
               `npx tsc --noEmit` because the repo uses project references. If
               `src/features/qa-feedback/__tests__/app-bridge.test.tsx` flakes,
               confirm in isolation before blaming your change.
            4. Commit with a clear message ending in `Closes #$ISSUE_NUMBER`
               (the squash merge uses commit messages for issue closure). Push.
            5. Open a PR. Body must include the AI marker, `Closes #$ISSUE_NUMBER`,
               a short change summary, "Reproduction" from the handoff, and
               "TDD" with either the Stage 1 test path or skip reason.

            **Single-stage shortcut**
            If there is no handoff and `git log origin/main..HEAD` is empty, this
            must be an exact `area:copy` or `area:ui-only` issue. Fetch only the
            issue body, read the QA target file, write a one-sentence failure path
            for the PR body, skip TDD with the area-label reason, then follow
            steps 2-5. If the labels do not match, escalate to `ready-for-human`.

            **Retro**
            Before every exit, write `.automation-retro-entry.md` using
            `docs/automation/retro-template.md`. Do not read/edit the archive; the
            workflow appends it after you exit.

            **Hard rules**
            - Stay on `agent/issue-$ISSUE_NUMBER`.
            - No main pushes; the workflow owns the retro push.
            - `.automation-retro-entry.md` is mandatory on every exit path.
            - Never modify/delete Stage 1's failing-test commit. If the test is
              wrong, escalate to `ready-for-human`.
            - Do not open a broken PR. If verify cannot be fixed, comment,
              remove `in-progress-by-agent`, add `ready-for-human`, write retro,
              and stop.
            - Do not post `@codex review`; Codex auto-reviews on PR open.
            - Follow CLAUDE.md critical guardrails.

      - name: Append retro entry
        if: always()
        env:
          RETRO_STAGE: implement
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RETRO_ENTRY_PATH: .automation-retro-entry.md
        run: node scripts/automation/append-retro.mjs
