name: implement

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: ${{ github.event.label.name == 'ready-for-PR' && !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout or create agent branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Stage 1 branch exists — checking it out."
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            echo "No Stage 1 branch — single-stage path. Creating from main."
            git checkout -B "$BRANCH" origin/main
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci && npm --prefix workers/qa-submit ci

      - name: Remove ready-for-PR label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label ready-for-PR

      - name: Configure git
        run: |
          git config user.name  "rentenwiki-agent[bot]"
          git config user.email "rentenwiki-agent[bot]@users.noreply.github.com"

      - name: Run implementer agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --allowed-tools Bash,Read,Edit,Write,Grep,Glob
          prompt: |
            You are the implementer agent for issue #${{ github.event.issue.number }} in PeterHartwieg/Rentenrechner.

            `CLAUDE.md` and `CONTEXT.md` are already loaded into your context via the
            harness's `claudeMd` system reminder — do NOT issue Read calls on those
            files. Consult specific sections by name when needed.

            **Your job is Stage 2 of a two-stage pipeline.** In the normal path,
            Stage 1 (`investigate.yml`) already reproduced the bug, made a
            TDD-vs-skip judgement call, wrote and committed a failing test (or
            chose to skip), pushed `agent/issue-$ISSUE_NUMBER`, and posted an
            investigation comment. You apply the fix, verify, and open the PR.

            **Single-stage path.** When triage routes a trivial issue
            (`area:copy` / `area:ui-only` with `Precision: exact`) directly to
            `ready-for-PR`, Stage 1 is skipped to save tokens. You'll detect
            this via: no investigation comment in the issue thread AND `git log
            origin/main..HEAD` showing zero commits. In that case do a
            lightweight reproduction inline (read the affected file the QA
            target id points at, articulate the failure path in one sentence
            for the PR body), skip TDD (the area label is the contract — pure
            copy / pure CSS), apply the fix, verify, open the PR.

            **Inputs**
            - Issue number: $ISSUE_NUMBER
            - Title: $ISSUE_TITLE
            - Labels (comma-separated): $ISSUE_LABELS
            - **Primary input — Stage 1's investigation comment.** Fetch ONLY this
              comment (not the full issue thread) via the handoff marker:
              ```bash
              gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
                --jq '[.[] | select(.body | startswith("<!-- agent-handoff:investigate -->"))] | last | .body'
              ```
              The comment is self-contained — it has `## Reproduction`,
              `## Files to edit`, `## Test status`, `## Branch`. Do NOT call
              `gh issue view --comments` (that loads triage + investigation +
              any human chatter unnecessarily).
              On the single-stage path (no Stage 1 ran), this query returns
              empty — fall through to the single-stage block below.
            - **Fallback — issue body.** Only fetch the body if you need the QA
              header table (target id, route) for the single-stage path:
              `gh issue view $ISSUE_NUMBER --json title,body --jq .body`. The
              `--json` form skips comments.
            - You are checked out on `agent/issue-$ISSUE_NUMBER` (either Stage 1
              created it, or the Stage 2 workflow created it on the single-stage
              path). Run `git log --oneline origin/main..HEAD` to see what's
              already committed.

            **What to do**

            1. **Read Stage 1's output (or detect single-stage path).**
               - Run `git log --oneline origin/main..HEAD`. Zero commits AND no
                 investigation comment on the issue → single-stage path. Skip to
                 the single-stage block below.
               - Otherwise: find the investigation comment (a comment whose body
                 contains `## Reproduction`, `## Test status`, `## Branch`).
                 Tells you the failure path and whether a test was written.
               - If a test was committed, run it once to confirm it still fails:
                 `npx vitest run <test-path>`. If it passes already, Stage 1
                 misdiagnosed — comment on the issue, apply `ready-for-human`,
                 remove `in-progress-by-agent`, exit. Do not implement.
               - If you find ZERO commits AND ZERO investigation comment AND the
                 issue is NOT labeled `area:copy` or `area:ui-only`: something
                 is broken (the single-stage shortcut requires the area label).
                 Comment, apply `ready-for-human`, remove `in-progress-by-agent`,
                 exit.

               **Single-stage block (only when no Stage 1 output exists AND label
               is `area:copy` or `area:ui-only`):**
               - Read the issue body (`gh issue view $ISSUE_NUMBER --json body`)
                 to find the `Target id` row in the QA header table.
               - Map target id to the affected file via the conventions in
                 `docs/agents/issue-tracker.md`. Read that file. Articulate the
                 failure path in one or two sentences ("`<file:line>` renders
                 `<wrong>` instead of `<right>` because <reason>") — that goes
                 in the PR body's "Reproduction" section.
               - Skip TDD: the area label is the contract (pure CSS / pure
                 copy is not unit-testable in this codebase). The PR body's
                 "TDD" section says `TDD-skip: <area-label>`.
               - Proceed to Step 2 (implement the fix).

            2. **Implement the fix.** Edit the relevant code per the failure path
               Stage 1 articulated. Keep the diff minimal and focused on what the
               issue asks for. Do not refactor surrounding code, do not add features
               beyond what the issue requires (per CLAUDE.md "Doing tasks").

               If a failing test is on the branch, the fix must make it pass without
               disabling or weakening it. If you find yourself changing the test to
               make it pass, you're solving the wrong problem — re-read the test +
               investigation comment.

            3. **Verify.** Run `npm run verify` (lint + tests + build per CLAUDE.md).
               Iterate until it passes. If a test outside your changes fails for an
               unrelated reason, leave a note in the PR body and continue — do not
               silently disable tests.

            4. **Commit + push.** Commit with a clear message ending with
               `Refs #$ISSUE_NUMBER`. Push the branch.

            5. **Open the PR.** Use `gh pr create` with:
               - Title: short imperative summary, prefixed with the conventional
                 type (`fix:`, `feat:`, `docs:`, `refactor:`, etc.) per recent
                 commit history.
               - Body: must include
                 - `Closes #$ISSUE_NUMBER` (so merge auto-closes the issue)
                 - A short description of what changed and why
                 - A "Reproduction" section copied verbatim from Stage 1's
                   investigation comment
                 - A "TDD" section saying either "Failing test added in Stage 1:
                   <path>" or "TDD-skip: <reason from Stage 1>"
                 - The standard AI-generated marker from
                   docs/agents/issue-tracker.md

            6. **Retro entry (mandatory, all exit paths).** Before stopping,
               append one entry to `docs/automation/retro-archive.md` and push
               directly to `main`. This applies to EVERY exit path: PR opened,
               Stage 1 misdiagnosis escalation, missing investigation comment,
               `npm run verify` won't pass. Even "no novel learnings" runs
               append an entry — it confirms the run was routine.

               Read `docs/automation/retro-template.md` (small, stable) for the
               entry format. **Do NOT read `docs/automation/retro-archive.md`** —
               it grows monotonically and you only need to append, never reference
               prior entries. Then:

               ```bash
               git checkout main
               git pull --rebase origin main
               # append your entry to docs/automation/retro-archive.md
               git add docs/automation/retro-archive.md
               git commit -m "retro: implement #$ISSUE_NUMBER"
               git push origin main
               ```

               If `git push` fails because of a concurrent retro push from
               another agent run, `git pull --rebase origin main` and retry once.

               Be specific. "I learned about the codebase" is useless. File
               paths, function names, line ranges, exact failure modes — that's
               what helps future runs.

               Stage-specific signal worth capturing in implementer retros:
               - Fix patterns that paid off (or surprised you)
               - Verify-flow gotchas (`npm run verify` failures with non-obvious
                 root causes)
               - Cases where Stage 1's failing test was wrong / weak / had to
                 be widened (Stage 1 escape signal)
               - Codebase invariants you ran into mid-fix (e.g. "X must always
                 happen before Y or Z breaks")

            7. **Done.** Stop after the PR is created. Do NOT comment `@codex review` —
               the Codex GitHub integration auto-reviews on PR open. Do NOT remove
               `in-progress-by-agent` — that label is cleared by the merge step.

            **Hard rules**
            - Stay on the `agent/issue-$ISSUE_NUMBER` branch for code work. The
              ONLY sanctioned push to `main` is the Step 6 retro append to
              `docs/automation/retro-archive.md`.
            - Never commit secrets, credentials, or `.env` files.
            - Step 6 retro fires on EVERY exit path — PR opened, Stage 1
              misdiagnosis escalation, missing investigation comment, verify
              failure escalation. No exit without a retro entry.
            - Never modify or delete Stage 1's failing-test commit. If the test is
              wrong, that's a Stage 1 escape — escalate via `ready-for-human`, do
              not silently fix the test.
            - If `npm run verify` fails after a reasonable number of iterations and
              you cannot diagnose it, post a comment on the issue explaining where
              you got stuck, remove `in-progress-by-agent`, add `ready-for-human`,
              and stop. Do not open a broken PR.
            - Follow `CLAUDE.md` "Critical guardrails" — license disclaimer must
              remain session-only, never collect PII without a backend story, etc.
