name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
      pr_title:
        description: "Pull request title"
        required: true
      head_sha:
        description: "Exact pull request head SHA to review"
        required: true
      head_ref:
        description: "Pull request head branch"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ startsWith(github.event.pull_request.head.ref || inputs.head_ref, 'agent/issue-') || startsWith(github.event.pull_request.head.ref || inputs.head_ref, 'automation/retro-curate-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || inputs.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Run Claude reviewer
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.head_sha }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref || inputs.head_ref }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          claude_args: --model claude-opus-4-7 --allowed-tools Bash(gh:*),Bash(git:*),Read,Grep,Glob
          prompt: |
            You are the Claude reviewer for PR #$PR_NUMBER on commit $PR_HEAD_SHA in
            PeterHartwieg/Rentenrechner. Branch: $PR_BRANCH.

            `CLAUDE.md` and `CONTEXT.md` are already loaded into your context via the
            harness's `claudeMd` system reminder — do NOT issue Read calls on those
            files. The sections you'll most often need: "Critical guardrails",
            "Review guidelines" (P0/P1 categories), "UI rounding boundary",
            "Non-obvious architecture".

            **Inputs**
            - Use `gh pr view $PR_NUMBER --json title,body,labels,files,additions,deletions`
              to get PR metadata.
            - Use `gh pr diff $PR_NUMBER` to read the full diff.
            - Use `gh pr view $PR_NUMBER --json body --jq .body` to find the linked
              issue (look for `Closes #N`). If present, read the issue with
              `gh issue view N`. Retro-curation PRs usually have no linked issue;
              review their Sources/Proposed promotions/Why-these body sections
              against the diff and the automation docs instead.

            **What to review**

            1. **Scope.** Does the diff stay focused on what the issue asks for, or does
               it sprawl into unrelated refactors/cleanup? Per CLAUDE.md "Doing tasks":
               no premature abstractions, no fixes outside scope, no unrequested features.
            2. **Correctness.** Does the change actually fix what the issue describes?
               Are edge cases handled? Are statutory values / tax rules / engine math
               touched safely (cohort tables, oracle goldens still pass)?
            3. **Test coverage.** If TDD ran, does the failing test actually exercise the
               bug (and would it catch a regression)? If TDD was skipped, is the skip
               reason valid (one of the listed area-label categories)?
            4. **Conventions.** Identifiers, file locations, formatter usage at the UI
               boundary (`formatCurrency`, `formatPercent`), engine vs UI separation,
               registry-based product extension. Cross-check against CLAUDE.md "Key files"
               and "UI rounding boundary".
            5. **Critical guardrails.** Disclaimer banner stays session-only. No new
               network surfaces without ADR. No PII collection. Fair-comparison invariant
               preserved in compare-mode. Public copy uses `RentenWiki.de`.
            6. **Verification.** A separate `pr-verify` workflow runs `npm run verify`
               on every PR — do NOT re-run it from this prompt (you don't have the
               npm allow-list anyway). Check its result via
               `gh pr checks $PR_NUMBER --json name,state,conclusion --jq '.[] | select(.name == "verify")'`.
               If verify failed or is still running with a known failure, that's
               automatic `Verdict: Request changes` with the failure summary in
               the body. If verify is queued or in-progress, you may approve on
               other criteria — review-loop will block the merge until verify
               passes (it re-checks before `gh pr merge`).

            **Output**

            Post exactly one formal PR review using `gh pr review`:
            - `gh pr review $PR_NUMBER --approve --body-file <file>` if everything looks good
            - `gh pr review $PR_NUMBER --request-changes --body-file <file>` if you found
              issues that must be addressed before merge
            - `gh pr review $PR_NUMBER --comment --body-file <file>` for soft observations
              that don't block merge (rare — prefer approve if you have no blockers)

            **Mandatory body format** (parsed by review-loop.yml + review-loop-sweep.yml):

            ```
            [Claude Review]

            Verdict: Approve
            <or>
            Verdict: Request changes

            <one-line summary>

            <bulleted findings — what was reviewed, what passed, what didn't>
            ```

            The first line MUST be the literal `[Claude Review]`. The third line MUST be
            either `Verdict: Approve` or `Verdict: Request changes` (exact spelling, no
            other variants — not "LGTM", not "Approve.", not "**Approve**"). Both
            review-loop and sweep regex-match these strings and ignore the formal review
            state (because Claude can't self-approve when claude[bot] also authored the
            PR — see Known Quirk #4 in docs/automation/issue-to-merge-pipeline.md).

            "Soft observations" reviews still need `Verdict: Approve` if you want the PR
            to merge. If your finding is genuinely blocking, use `Verdict: Request
            changes`. There is no third state.

            **Hard rules**
            - Post exactly ONE review. Do not post multiple reviews per workflow run.
            - Body MUST contain the exact `Verdict: Approve` or `Verdict: Request
              changes` line. A review without this line will hang the PR — the loop
              treats marker-less reviews as "ambiguous, wait for a clearer signal" and
              the sweep cannot merge it.
            - Do not push commits, do not edit files, do not edit the PR body, do not
              add or remove labels — your only output is the formal review.
            - If the `pr-verify` check (separate workflow) failed on the head commit,
              that's automatic `Verdict: Request changes` with the failure summary
              copied from `gh run view` in the body.
            - Stay terse. The review body is read by both humans and the implementer
              agent on the next iteration; bulleted findings beat prose paragraphs.
            - **Do not expand the agent's scope by suggesting "could also do X"** in your
              findings. The implementer agent treats reviewer suggestions as actionable
              asks. If X is in scope, request changes for X explicitly. If X is out of
              scope, do not mention it — file a separate issue or leave it for retro
              curation.

      - name: Assert Claude review was posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          review_count=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.commit_id == "'"$PR_HEAD_SHA"'") | select(.body | startswith("[Claude Review]"))] | length')
          if [ "$review_count" -eq 0 ]; then
            echo "Claude review workflow completed without posting a [Claude Review] review on $PR_HEAD_SHA."
            exit 1
          fi
